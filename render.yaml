databases:
  - name: hiresmart-db
    databaseName: hiresmart
    user: hiresmart_user
    plan: free

services:
  - type: web
    name: hiresmart-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: "HireSmart AI"
      - key: APP_ENV
        value: "production"
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: "stderr"
      - key: CACHE_STORE
        value: "file"
      - key: QUEUE_CONNECTION
        value: "sync"
      - key: SESSION_DRIVER
        value: "file"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: "pgsql"
      - key: DB_URL
        fromDatabase:
          name: hiresmart-db
          property: connectionString
      - key: RUN_MIGRATIONS
        value: "true"
